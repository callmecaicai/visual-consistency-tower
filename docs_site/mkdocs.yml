site_name: 视觉理论大厦
site_description: 一致性建模知识库
docs_dir: docs
site_dir: site
use_directory_urls: true
theme:
  name: material
  language: zh
  font: false
  features:
  - navigation.indexes
  - navigation.tabs
  - navigation.sections
  - navigation.top
  - navigation.tracking
  - search.highlight
  - search.suggest
  - toc.follow
  - content.code.copy
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: custom
    accent: custom
    toggle:
      icon: material/weather-night
      name: 切换到深色模式
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: custom
    accent: custom
    toggle:
      icon: material/weather-sunny
      name: 切换到浅色模式
plugins:
- search
markdown_extensions:
- admonition
- attr_list
- md_in_html
- tables
- toc
- pymdownx.details
- pymdownx.superfences
- pymdownx.highlight
- pymdownx.inlinehilite
- pymdownx.tabbed
extra_css:
- assets/stylesheets/extra.css
